name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 0.1.0) — creates tag v<version> if it does not exist'
        required: true
        default: '0.1.0'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build (${{ matrix.label }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: macOS arm64
          - platform: macos-latest
            target: x86_64-apple-darwin
            label: macOS x86_64
          - platform: ubuntu-22.04
            target: ''
            label: Linux
          - platform: windows-latest
            target: ''
            label: Windows

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Rust targets
        if: matrix.target != ''
        run: rustup target add ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend deps
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v${{ inputs.version || github.ref_name }}
          releaseName: v${{ inputs.version || github.ref_name }}
          releaseBody: |
            Ready-to-run installers for The Artist's Image.

            - **Windows**: download the `.msi` (installer) or `.exe`
            - **macOS**: download the `.dmg` or `.app.tar.gz`. The app is unsigned — first launch needs right-click → Open
            - **Linux**: download the `.deb` (Debian/Ubuntu) or `.AppImage`
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.target && format('--target {0}', matrix.target) || '' }}
